services:
  - type: web
    name: cost-estimation-engine-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: FRONTEND_URL
        value: https://cost-estimation-engine.onrender.com
      - key: LLAMA_API_KEY
        sync: false

  - type: web
    name: cost-estimation-engine
    runtime: static
    rootDir: frontend
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://cost-estimation-engine-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

